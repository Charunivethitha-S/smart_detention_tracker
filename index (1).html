<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💡 AI Smart Detention Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    display:flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 2.2em;
    margin-bottom: 20px;
    text-align:center;
    text-shadow: 2px 2px 10px #000;
  }
  .dashboard-summary {
    background: rgba(255,255,255,0.05);
    padding:15px 25px;
    border-radius: 15px;
    text-align:center;
    margin-bottom:25px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    width: 90%;
    max-width:800px;
  }
  .dashboard-summary h2 { margin:5px 0; color:#00e676;}
  .subjects-container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    width:100%;
  }
  .card {
    background: rgba(255,255,255,0.1);
    border-radius:20px;
    padding:15px;
    width:250px;
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
    text-align:center;
  }
  .card h3 { margin-bottom:10px; color:#00bfa5; }
  input[type=number]{
    width:60px; padding:5px; border-radius:5px; border:1px solid #555; background:#111; color:#fff; text-align:center; margin:5px;
  }
  .progress-bar-bg{
    background:#333; border-radius:10px; height:15px; width:100%; margin:10px 0;
  }
  .progress-bar-fill{
    background:#00e676; height:15px; border-radius:10px; width:0%; transition:0.5s;
  }
  .status { font-weight:bold; margin-top:5px;}
  .safe { color:#00e676; }
  .risk { color:#ffeb3b; }
  .detained { color:#f44336; }
  .button {
    background:#00e676;
    color:#111;
    border:none;
    border-radius:8px;
    padding:8px 12px;
    cursor:pointer;
    font-weight:600;
    margin-top:10px;
  }
  .button:hover { background:#00c853; }
  .suggestion { margin-top:10px; color:#ffab00; font-weight:bold; min-height:20px; }
</style>
</head>
<body>

<h1>💡 AI Smart Detention Tracker</h1>

<div class="dashboard-summary" id="overall-summary">
  <h2>Overall Attendance: 0%</h2>
  <div id="overall-status">Status: 🟢 Safe</div>
  <div id="total-classes">Total Classes: 0 | Attended: 0</div>
  <div id="priority-suggestion">⚡ Focus on: -</div>
  <button class="button" onclick="simulateFuture()">Simulate Future</button>
</div>

<div class="subjects-container" id="subjects-container"></div>

<script>
// Constants for yearly classes
const weeksInYear = 52;
const weekendsPerWeek = 2; // Sat/Sun
const totalWeekdays = weeksInYear*5; // Mon-Fri
const holidays = 12; // total govt+HSE holidays in weekdays

// Subjects and weekly periods
const subjects = [
  {name:'Probability & Stochastic Processes', weekly:4},
  {name:'Analog Circuits', weekly:3},
  {name:'Analog Circuits Lab', weekly:2},
  {name:'Signal Processing', weekly:4},
  {name:'Design Thinking', weekly:2},
  {name:'Artificial Intelligence', weekly:3},
  {name:'Advanced Digital Systems', weekly:3},
  {name:'PCB Design', weekly:2},
  {name:'Critical Thinking', weekly:1}
];

// Calculate yearly total classes for each subject
subjects.forEach(sub=>{
  sub.totalClassesYear = (totalWeekdays - holidays) * sub.weekly / 5; // proportional to weekly periods
});

const subjectsContainer = document.getElementById('subjects-container');

// Create subject cards
subjects.forEach(sub=>{
  const card = document.createElement('div');
  card.className='card';
  const id = sub.name.replace(/\s/g,'');
  card.innerHTML = `
    <h3>${sub.name}</h3>
    <div>Total Classes: ${sub.totalClassesYear}</div>
    <input type="number" id="${id}-attended" placeholder="Attended">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="${id}-progress"></div></div>
    <div class="status" id="${id}-status">Status: 🟢</div>
    <div class="suggestion" id="${id}-suggestion"></div>
    <button class="button" onclick="updateSubject('${id}',${sub.totalClassesYear})">Check</button>
  `;
  subjectsContainer.appendChild(card);
});

// Update single subject
function updateSubject(id,totalClassesYear){
  const attended = parseInt(document.getElementById(id+'-attended').value) || 0;
  const perc = Math.min(100, Math.round((attended/totalClassesYear)*100));
  document.getElementById(id+'-progress').style.width = perc+'%';

  const statusEl = document.getElementById(id+'-status');
  const suggestionEl = document.getElementById(id+'-suggestion');

  if(perc>=75){ statusEl.textContent='Status: 🟢 Safe'; statusEl.className='status safe'; }
  else if(perc>=60){ statusEl.textContent='Status: 🟡 Risk'; statusEl.className='status risk'; }
  else{ statusEl.textContent='Status: 🔴 Detained'; statusEl.className='status detained'; }

  const need = Math.ceil(0.75*totalClassesYear - attended);
  suggestionEl.textContent = perc>=75?'':`You need to attend ${need} more classes to reach 75%`;

  updateOverall();
}

// Update overall dashboard
function updateOverall(){
  let totalClasses=0, totalAttended=0, lowestSubjects=[];
  subjects.forEach(sub=>{
    const id = sub.name.replace(/\s/g,'');
    const attended = parseInt(document.getElementById(id+'-attended').value) || 0;
    const perc = attended/sub.totalClassesYear*100 || 0;
    totalClasses += sub.totalClassesYear;
    totalAttended += attended;
    if(perc<75) lowestSubjects.push(sub.name);
  });
  const overallPerc = Math.round(totalAttended/totalClasses*100) || 0;
  document.querySelector('#overall-summary h2').textContent=`Overall Attendance: ${overallPerc}%`;
  let status = '🟢 Safe';
  if(overallPerc<60) status='🔴 Detained';
  else if(overallPerc<75) status='🟡 Risk';
  document.getElementById('overall-status').textContent='Status: '+status;
  document.getElementById('total-classes').textContent=`Total Classes: ${totalClasses.toFixed(0)} | Attended: ${totalAttended}`;
  document.getElementById('priority-suggestion').textContent=`⚡ Focus on: ${lowestSubjects.join(', ') || '-'}`;
}

// Simulate future attendance
function simulateFuture(){
  let add=prompt("Enter number of future classes you will attend for all subjects:");
  add=parseInt(add);
  if(isNaN(add)||add<0) return;
  subjects.forEach(sub=>{
    const id = sub.name.replace(/\s/g,'');
    const attended = parseInt(document.getElementById(id+'-attended').value)||0;
    document.getElementById(id+'-attended').value = attended + add;
    updateSubject(id,sub.totalClassesYear);
  });
}
</script>

</body>
</html>
